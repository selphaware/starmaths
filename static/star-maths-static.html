<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Star Maths — Space Adventure!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#0a0e27;--mid:#141937;--light:#1e2650;
  --purple:#7c3aed;--pink:#ec4899;--blue:#3b82f6;
  --gold:#fbbf24;--orange:#f97316;--cyan:#22d3ee;--green:#34d399;
  --red:#ef4444;--moon:#f0f0ff;--ring:#c084fc;
  --ff:'Fredoka',sans-serif;--fm:'Space Mono',monospace;
}
html,body{height:100%;font-family:var(--ff);background:var(--deep);color:var(--moon);overflow-x:hidden}

/* ── Starfield ──────────────────────────── */
body::before,body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0}
body::before{
  background:
    radial-gradient(1.5px 1.5px at 10% 20%,#fff 50%,transparent 100%),
    radial-gradient(1px 1px at 30% 60%,#dde 50%,transparent 100%),
    radial-gradient(2px 2px at 50% 10%,var(--gold) 50%,transparent 100%),
    radial-gradient(1px 1px at 70% 80%,#fff 50%,transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 40%,#ccf 50%,transparent 100%),
    radial-gradient(1px 1px at 15% 90%,#fff 50%,transparent 100%),
    radial-gradient(2px 2px at 85% 15%,var(--cyan) 50%,transparent 100%),
    radial-gradient(1px 1px at 45% 45%,#fff 50%,transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 70%,#eef 50%,transparent 100%),
    radial-gradient(1px 1px at 25% 35%,#fff 50%,transparent 100%);
  animation:twinkle 4s ease-in-out infinite alternate;
}
body::after{
  background:
    radial-gradient(1px 1px at 5% 50%,#fff 50%,transparent 100%),
    radial-gradient(1.5px 1.5px at 20% 10%,#eef 50%,transparent 100%),
    radial-gradient(1px 1px at 40% 85%,#fff 50%,transparent 100%),
    radial-gradient(2px 2px at 65% 30%,var(--gold) 50%,transparent 100%),
    radial-gradient(1px 1px at 80% 65%,#fff 50%,transparent 100%),
    radial-gradient(1.5px 1.5px at 95% 90%,#ddf 50%,transparent 100%);
  animation:twinkle 5s ease-in-out 1s infinite alternate;opacity:.7;
}
@keyframes twinkle{0%{opacity:.6}100%{opacity:1}}

.nebula{position:fixed;border-radius:50%;filter:blur(80px);opacity:.15;pointer-events:none;z-index:0}
.n1{width:500px;height:500px;background:var(--purple);top:-100px;right:-100px}
.n2{width:400px;height:400px;background:var(--pink);bottom:-50px;left:-50px}
.n3{width:350px;height:350px;background:var(--blue);top:50%;left:50%;transform:translate(-50%,-50%)}

.planet{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.p1{width:60px;height:60px;bottom:10%;right:5%;background:radial-gradient(circle at 35% 35%,var(--orange),#c2410c);box-shadow:inset -8px -8px 15px rgba(0,0,0,.4),0 0 20px rgba(249,115,22,.3);animation:ob1 20s linear infinite}
.p2{width:40px;height:40px;top:15%;left:8%;background:radial-gradient(circle at 35% 35%,var(--cyan),#0891b2);box-shadow:inset -5px -5px 10px rgba(0,0,0,.4),0 0 15px rgba(34,211,238,.3);animation:ob2 15s linear infinite}
.p3{width:80px;height:80px;top:60%;left:3%;background:radial-gradient(circle at 30% 30%,#c084fc,#7c3aed);box-shadow:inset -10px -10px 20px rgba(0,0,0,.3),0 0 25px rgba(192,132,252,.2);animation:ob3 25s linear infinite}
.p3::after{content:'';position:absolute;top:50%;left:50%;width:120px;height:20px;border-radius:50%;border:3px solid rgba(192,132,252,.4);transform:translate(-50%,-50%) rotate(-20deg)}
@keyframes ob1{0%{transform:translateY(0)}50%{transform:translateY(-15px) translateX(8px)}100%{transform:translateY(0)}}
@keyframes ob2{0%{transform:translateY(0)}50%{transform:translateY(10px) translateX(-10px)}100%{transform:translateY(0)}}
@keyframes ob3{0%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(5deg)}100%{transform:translateY(0) rotate(0deg)}}

/* ── Nav Bar ────────────────────────────── */
.nav-bar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:6px;
  padding:10px 14px;
  background:linear-gradient(to bottom,rgba(10,14,39,.9),rgba(10,14,39,0));
  pointer-events:none;
}
.nav-bar.hidden{display:none}
.nav-btn{
  pointer-events:auto;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:7px 16px;color:var(--moon);
  font-family:var(--ff);font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s;
  display:flex;align-items:center;gap:4px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.nav-btn:hover{background:rgba(255,255,255,.15);border-color:var(--cyan)}

/* ── Screens ────────────────────────────── */
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:20px}
.screen.active{display:flex;flex-direction:column;align-items:center}

/* ── Shared ─────────────────────────────── */
.title{
  font-size:clamp(2rem,6vw,3.8rem);font-weight:700;text-align:center;line-height:1.2;
  background:linear-gradient(135deg,var(--gold),var(--orange),var(--pink),var(--purple));
  background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 4s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.subtitle{font-size:1.05rem;opacity:.7;text-align:center}

.btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--blue));border:none;border-radius:16px;
  padding:14px 32px;color:#fff;font-family:var(--ff);font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;
}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(124,58,237,.5)}
.btn-secondary{
  background:transparent;border:2px solid rgba(255,255,255,.15);border-radius:16px;
  padding:14px 32px;color:var(--moon);font-family:var(--ff);font-size:1rem;font-weight:600;cursor:pointer;transition:.2s;
}
.btn-secondary:hover{border-color:var(--cyan)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* ── Quasar ─────────────────────────────── */
.quasar-wrap{position:relative;width:130px;height:130px;margin:10px auto 6px}
.quasar-core{
  position:absolute;top:50%;left:50%;width:32px;height:32px;
  transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(circle,#fff 0%,var(--cyan) 40%,var(--purple) 80%,transparent 100%);
  box-shadow:0 0 30px 10px rgba(34,211,238,.5),0 0 60px 20px rgba(124,58,237,.3);
}
.quasar-ring{
  position:absolute;inset:0;border-radius:50%;
  border:3px solid transparent;
  border-top-color:var(--cyan);border-right-color:rgba(124,58,237,.5);
  animation:qspin 3s linear infinite;
  filter:drop-shadow(0 0 6px rgba(34,211,238,.6));
}
.quasar-ring2{
  position:absolute;inset:12px;border-radius:50%;
  border:2px solid transparent;
  border-bottom-color:var(--pink);border-left-color:rgba(251,191,36,.4);
  animation:qspin 2s linear infinite reverse;
  filter:drop-shadow(0 0 4px rgba(236,72,153,.5));
}
.quasar-ring3{
  position:absolute;inset:24px;border-radius:50%;
  border:1.5px solid transparent;
  border-top-color:var(--gold);border-left-color:rgba(34,211,238,.3);
  animation:qspin 4.5s linear infinite;
  filter:drop-shadow(0 0 4px rgba(251,191,36,.5));
}
.quasar-jet{
  position:absolute;top:50%;left:50%;width:180px;height:6px;
  transform:translate(-50%,-50%);
  background:linear-gradient(90deg,transparent 0%,rgba(34,211,238,.35) 20%,rgba(124,58,237,.55) 50%,rgba(34,211,238,.35) 80%,transparent 100%);
  border-radius:50%;filter:blur(2px);
  animation:qspin 3s linear infinite;
}
@keyframes qspin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

/* ── Character Select ───────────────────── */
#char-screen{justify-content:center;gap:16px;padding:20px 20px 60px}
.char-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:10px;max-width:850px;width:100%;
}
.char-btn{
  background:var(--light);border:2px solid rgba(255,255,255,.06);
  border-radius:16px;padding:10px 4px 8px;text-align:center;cursor:pointer;
  transition:.25s;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.char-btn:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 6px 20px rgba(251,191,36,.25)}
.char-btn.selected{border-color:var(--cyan);background:rgba(34,211,238,.12);box-shadow:0 0 20px rgba(34,211,238,.3)}
.char-emoji{font-size:2rem;line-height:1.1}
.char-name{font-size:.65rem;font-weight:600;opacity:.8;line-height:1.1}
.btn-go{margin-top:10px;font-size:1.15rem;padding:16px 50px}

/* ── Level Select ───────────────────────── */
#level-screen{gap:20px;padding:54px 20px 60px}
.level-header{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.level-header .avatar{font-size:2.2rem}
.level-header h2{font-size:1.3rem;font-weight:700}
.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;max-width:900px;width:100%}
.level-card{
  background:linear-gradient(145deg,var(--light),var(--mid));border:2px solid rgba(255,255,255,.06);
  border-radius:20px;padding:20px;cursor:pointer;transition:.3s;position:relative;overflow:hidden;
}
.level-card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,transparent 60%,rgba(124,58,237,.12));pointer-events:none}
.level-card:hover{transform:translateY(-4px);border-color:var(--cyan);box-shadow:0 8px 30px rgba(34,211,238,.2)}
.lv-num{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin-bottom:2px}
.lv-name{font-size:1.15rem;font-weight:700;margin-bottom:6px}
.lv-ops{font-size:.85rem;opacity:.7}
.lv-meta{font-size:.72rem;opacity:.45;margin-top:4px}
.lv-mult{display:inline-block;background:rgba(251,191,36,.15);color:var(--gold);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:8px;margin-top:6px}

/* ── Game Screen ────────────────────────── */
#game-screen{justify-content:center;gap:18px;padding:54px 20px 60px}
.game-hud{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:620px;gap:8px;flex-wrap:wrap}
.hud-item{background:var(--light);border-radius:14px;padding:8px 14px;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.06)}
.timer-wrap{width:100%;max-width:620px;height:10px;background:var(--light);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.timer-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .1s linear,background .3s}
.timer-bar.slow{background:linear-gradient(90deg,var(--orange),var(--gold))}
.timer-bar.very-slow{background:linear-gradient(90deg,var(--red),var(--orange))}
.q-card{
  background:linear-gradient(145deg,var(--light),rgba(30,38,80,.8));
  border:2px solid rgba(255,255,255,.08);border-radius:24px;padding:36px 28px;
  text-align:center;width:100%;max-width:620px;min-height:200px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;position:relative;
}
.q-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(124,58,237,.08),transparent 60%);pointer-events:none}
.q-text{font-size:clamp(1.8rem,5vw,3rem);font-weight:700;line-height:1.4;position:relative}
/* ── Colour-coded operators ──── */
.q-text .op{
  display:inline-block;font-weight:700;margin:0 .15em;
  padding:2px 8px;border-radius:10px;font-family:var(--fm);
  vertical-align:middle;letter-spacing:0;line-height:1;
}
.q-text .op-plus{color:#22ff88;background:rgba(34,255,136,.12);text-shadow:0 0 8px rgba(34,255,136,.4)}
.q-text .op-minus{color:#ff6b8a;background:rgba(255,107,138,.12);text-shadow:0 0 8px rgba(255,107,138,.4)}
.q-text .op-times{color:#ffaa22;background:rgba(255,170,34,.12);text-shadow:0 0 8px rgba(255,170,34,.4)}
.q-text .op-divide{color:#44ccff;background:rgba(68,204,255,.12);text-shadow:0 0 8px rgba(68,204,255,.4)}
.q-text .op-bracket{color:#c084fc;background:rgba(192,132,252,.1)}
.q-text .frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 6px;font-size:.7em;line-height:1}
.q-text .frac .num{border-bottom:3px solid var(--moon);padding:0 6px 4px}
.q-text .frac .den{padding:4px 6px 0}
.ans-row{display:flex;gap:12px;align-items:center}
.ans-input{
  background:var(--mid);border:2px solid rgba(255,255,255,.15);border-radius:16px;
  padding:14px 20px;font-family:var(--fm);font-size:1.5rem;color:var(--moon);
  text-align:center;width:200px;outline:none;transition:.2s;
}
.ans-input:focus{border-color:var(--cyan)}
.ans-input.correct{border-color:var(--green)!important;box-shadow:0 0 20px rgba(52,211,153,.4);animation:pop .3s ease}
.ans-input.wrong{border-color:var(--red)!important;box-shadow:0 0 20px rgba(239,68,68,.4);animation:shake .4s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.btn-go-q{background:linear-gradient(135deg,var(--purple),var(--blue));border:none;border-radius:16px;padding:14px 28px;color:#fff;font-family:var(--ff);font-size:1.1rem;font-weight:700;cursor:pointer;transition:.2s}
.btn-go-q:hover{transform:scale(1.05)}
.feedback{font-size:1rem;font-weight:600;min-height:1.4em}
.feedback.ok{color:var(--green)}.feedback.no{color:var(--red)}
.streak-line{font-size:.95rem;font-weight:600;color:var(--gold);min-height:1.4em}

/* ── Results Screen ─────────────────────── */
#results-screen{justify-content:center;gap:20px;padding:54px 20px 60px}
.results-card{
  background:linear-gradient(145deg,var(--light),var(--mid));border:2px solid rgba(255,255,255,.08);
  border-radius:28px;padding:36px 28px;text-align:center;width:100%;max-width:540px;
}
.res-emoji{font-size:4rem;margin-bottom:8px}
.res-title{font-size:1.8rem;font-weight:700;margin-bottom:4px}
.res-sub{font-size:.95rem;opacity:.7;margin-bottom:20px}
.score-hero{
  font-size:3rem;font-weight:700;margin:10px 0 4px;
  background:linear-gradient(135deg,var(--gold),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.score-label{font-size:.8rem;opacity:.5;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.res-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.rs{background:rgba(255,255,255,.04);border-radius:14px;padding:12px 8px}
.rs .v{font-size:1.4rem;font-weight:700}
.rs .l{font-size:.68rem;opacity:.5;margin-top:2px}
.rs .v.gold{color:var(--gold)}.rs .v.green{color:var(--green)}.rs .v.cyan{color:var(--cyan)}.rs .v.pink{color:var(--pink)}.rs .v.orange{color:var(--orange)}
.score-breakdown{text-align:left;margin:16px 0;font-size:.8rem;opacity:.7}
.score-breakdown h4{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:6px}
.sb-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sb-row.perfect{color:var(--gold);font-weight:700}
.perfect-banner{
  background:linear-gradient(135deg,var(--gold),var(--orange));color:var(--deep);
  border-radius:14px;padding:12px;font-weight:700;font-size:1rem;margin-bottom:10px;animation:pop .5s ease;
}

/* ── Confetti ───────────────────────────── */
.confetti-box{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;animation:cfall 3s ease-in forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── Game Background: Explorer Rocket Flight ── */
.game-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.game-bg .gp{position:absolute;border-radius:50%;will-change:transform,opacity}

/* Explorer + Rocket composite */
.explorer-ship{
  position:absolute;z-index:2;display:flex;flex-direction:column;align-items:center;
  filter:drop-shadow(0 0 12px rgba(255,255,255,.3));
  will-change:transform;
}
.explorer-ship .ex-char{font-size:2.2rem;line-height:1;position:relative;z-index:1}
.explorer-ship .ex-rocket{font-size:2.6rem;line-height:1;margin-top:-8px}
.explorer-ship .ex-glow{
  position:absolute;bottom:-10px;left:50%;width:30px;height:50px;
  transform:translateX(-50%);border-radius:50%;
  filter:blur(12px);opacity:.6;will-change:opacity;
  animation:exGlow 1s ease-in-out infinite alternate;
}
@keyframes exGlow{0%{opacity:.4;transform:translateX(-50%) scaleY(.8)}100%{opacity:.8;transform:translateX(-50%) scaleY(1.2)}}

/* Exhaust particles */
.exhaust{position:absolute;border-radius:50%;will-change:transform,opacity;animation:exhaustFade var(--exDur) ease-out forwards}
@keyframes exhaustFade{
  0%{transform:translate(0,0) scale(1);opacity:.8}
  100%{transform:translate(var(--exDx),var(--exDy)) scale(0);opacity:0}
}

/* ── Animal movement archetypes ─────────── */
/* prowl: cat/fox/wolf — low slink, pause, pounce */
@keyframes prowl{
  0%{left:5%;top:65%;transform:rotate(5deg) scaleX(1)}
  12%{left:8%;top:63%;transform:rotate(3deg) scaleX(1)}
  18%{left:30%;top:55%;transform:rotate(-8deg) scaleX(1)}
  30%{left:32%;top:53%;transform:rotate(-3deg) scaleX(1)}
  35%{left:65%;top:40%;transform:rotate(-15deg) scaleX(1)}
  48%{left:68%;top:38%;transform:rotate(-5deg) scaleX(1)}
  53%{left:85%;top:55%;transform:rotate(12deg) scaleX(-1)}
  65%{left:82%;top:57%;transform:rotate(5deg) scaleX(-1)}
  72%{left:50%;top:68%;transform:rotate(10deg) scaleX(-1)}
  82%{left:48%;top:66%;transform:rotate(3deg) scaleX(-1)}
  88%{left:15%;top:60%;transform:rotate(8deg) scaleX(-1)}
  100%{left:5%;top:65%;transform:rotate(5deg) scaleX(1)}
}
/* hop: bunny/frog/monkey — parabolic bouncy arcs */
@keyframes hop{
  0%{left:5%;top:72%;transform:rotate(0deg)}
  8%{left:15%;top:30%;transform:rotate(-20deg)}
  16%{left:25%;top:72%;transform:rotate(5deg)}
  24%{left:35%;top:25%;transform:rotate(-25deg)}
  32%{left:45%;top:72%;transform:rotate(5deg)}
  40%{left:55%;top:20%;transform:rotate(-20deg)}
  48%{left:65%;top:72%;transform:rotate(5deg)}
  56%{left:75%;top:28%;transform:rotate(-22deg)}
  64%{left:85%;top:72%;transform:rotate(5deg)}
  72%{left:75%;top:25%;transform:rotate(20deg)}
  80%{left:55%;top:72%;transform:rotate(-5deg)}
  88%{left:30%;top:30%;transform:rotate(15deg)}
  100%{left:5%;top:72%;transform:rotate(0deg)}
}
/* swim: dolphin/whale/shark — undulating sine wave */
@keyframes swim{
  0%{left:-5%;top:50%;transform:rotate(8deg) scaleX(1)}
  12%{left:15%;top:35%;transform:rotate(-12deg) scaleX(1)}
  25%{left:35%;top:55%;transform:rotate(10deg) scaleX(1)}
  37%{left:55%;top:30%;transform:rotate(-15deg) scaleX(1)}
  50%{left:80%;top:50%;transform:rotate(5deg) scaleX(1)}
  55%{left:85%;top:52%;transform:rotate(5deg) scaleX(-1)}
  67%{left:65%;top:35%;transform:rotate(-10deg) scaleX(-1)}
  80%{left:35%;top:55%;transform:rotate(12deg) scaleX(-1)}
  92%{left:10%;top:40%;transform:rotate(-8deg) scaleX(-1)}
  100%{left:-5%;top:50%;transform:rotate(8deg) scaleX(1)}
}
/* soar: eagle/owl/phoenix/dragon — majestic banking circles */
@keyframes soar{
  0%{left:50%;top:15%;transform:rotate(-5deg)}
  15%{left:85%;top:25%;transform:rotate(25deg)}
  30%{left:80%;top:55%;transform:rotate(15deg)}
  45%{left:50%;top:70%;transform:rotate(-5deg)}
  60%{left:15%;top:55%;transform:rotate(-25deg)}
  75%{left:10%;top:25%;transform:rotate(-15deg)}
  90%{left:35%;top:12%;transform:rotate(-8deg)}
  100%{left:50%;top:15%;transform:rotate(-5deg)}
}
/* lumber: bear/gorilla/panda — slow heavy sway */
@keyframes lumber{
  0%{left:15%;top:60%;transform:rotate(2deg) scale(1)}
  15%{left:18%;top:55%;transform:rotate(-3deg) scale(1.05)}
  30%{left:40%;top:50%;transform:rotate(4deg) scale(1)}
  45%{left:55%;top:55%;transform:rotate(-2deg) scale(1.05)}

<script>
/* ═══════════════════════════════════════════════════
   STAR MATHS — Fully self-contained static version
   No server needed. Just open this HTML file.
   ═══════════════════════════════════════════════════ */

// ── 36 Characters ────────────────────────────────
const CHARACTERS = [
  {id:'astro-cat',       emoji:'🐱', name:'Astro Cat'},
  {id:'cosmic-fox',      emoji:'🦊', name:'Cosmic Fox'},
  {id:'star-wolf',       emoji:'🐺', name:'Star Wolf'},
  {id:'nebula-bear',     emoji:'🐻', name:'Nebula Bear'},
  {id:'rocket-bunny',    emoji:'🐰', name:'Rocket Bunny'},
  {id:'lunar-panda',     emoji:'🐼', name:'Lunar Panda'},
  {id:'galaxy-lion',     emoji:'🦁', name:'Galaxy Lion'},
  {id:'comet-tiger',     emoji:'🐯', name:'Comet Tiger'},
  {id:'orbit-owl',       emoji:'🦉', name:'Orbit Owl'},
  {id:'solar-eagle',     emoji:'🦅', name:'Solar Eagle'},
  {id:'meteor-monkey',   emoji:'🐵', name:'Meteor Monkey'},
  {id:'void-dragon',     emoji:'🐉', name:'Void Dragon'},
  {id:'plasma-penguin',  emoji:'🐧', name:'Plasma Penguin'},
  {id:'quasar-koala',    emoji:'🐨', name:'Quasar Koala'},
  {id:'pulsar-dolphin',  emoji:'🐬', name:'Pulsar Dolphin'},
  {id:'warp-whale',      emoji:'🐋', name:'Warp Whale'},
  {id:'nova-unicorn',    emoji:'🦄', name:'Nova Unicorn'},
  {id:'turbo-turtle',    emoji:'🐢', name:'Turbo Turtle'},
  {id:'blaze-bee',       emoji:'🐝', name:'Blaze Bee'},
  {id:'flare-frog',      emoji:'🐸', name:'Flare Frog'},
  {id:'zenith-zebra',    emoji:'🦓', name:'Zenith Zebra'},
  {id:'dark-bat',        emoji:'🦇', name:'Dark Matter Bat'},
  {id:'hyper-hamster',   emoji:'🐹', name:'Hyper Hamster'},
  {id:'gravity-gorilla', emoji:'🦍', name:'Gravity Gorilla'},
  {id:'spark-shark',     emoji:'🦈', name:'Spark Shark'},
  {id:'thunder-rex',     emoji:'🦖', name:'Thunder Rex'},
  {id:'photon-phoenix',  emoji:'🔥', name:'Photon Phoenix'},
  {id:'astro-alien',     emoji:'👾', name:'Astro Alien'},
  {id:'robo-ranger',     emoji:'🤖', name:'Robo Ranger'},
  {id:'captain-croc',    emoji:'🐊', name:'Captain Croc'},
  {id:'eclipse-elk',     emoji:'🦌', name:'Eclipse Elk'},
  {id:'dash-dog',        emoji:'🐶', name:'Dash Dog'},
  {id:'space-kitten',    emoji:'😺', name:'Space Kitten'},
  {id:'star-sloth',      emoji:'🦥', name:'Star Sloth'},
  {id:'jet-jellyfish',   emoji:'🪼', name:'Jet Jellyfish'},
  {id:'astro-octopus',   emoji:'🐙', name:'Astro Octopus'},
];

// ── 10 Levels (all open) ────────────────────────
const LEVELS = [
  {id:1,  name:'Tiny Astronaut',      age:'4-5',  ops:['+'],                maxNum:5,   time:30, count:8,  fractions:false, brackets:false, multiplier:1.0},
  {id:2,  name:'Moon Hopper',         age:'4-5',  ops:['+','-'],            maxNum:10,  time:25, count:10, fractions:false, brackets:false, multiplier:1.2},
  {id:3,  name:'Star Collector',      age:'5-6',  ops:['+','-'],            maxNum:20,  time:20, count:10, fractions:false, brackets:false, multiplier:1.5},
  {id:4,  name:'Rocket Pilot',        age:'6-7',  ops:['+','-','×'],        maxNum:12,  time:20, count:12, fractions:false, brackets:false, multiplier:1.8},
  {id:5,  name:'Planet Explorer',     age:'7-8',  ops:['+','-','×','÷'],    maxNum:12,  time:15, count:12, fractions:false, brackets:false, multiplier:2.2},
  {id:6,  name:'Asteroid Miner',      age:'7-8',  ops:['+','-','×','÷'],    maxNum:50,  time:15, count:14, fractions:false, brackets:false, multiplier:2.6},
  {id:7,  name:'Nebula Navigator',    age:'8-9',  ops:['+','-','×','÷'],    maxNum:100, time:12, count:14, fractions:true,  brackets:false, multiplier:3.0},
  {id:8,  name:'Galaxy Guardian',     age:'8-9',  ops:['+','-','×','÷'],    maxNum:100, time:12, count:15, fractions:true,  brackets:true,  multiplier:3.5},
  {id:9,  name:'Supernova Scientist', age:'9-10', ops:['+','-','×','÷'],    maxNum:200, time:10, count:15, fractions:true,  brackets:true,  multiplier:4.0},
  {id:10, name:'Universe Commander',  age:'9-10', ops:['+','-','×','÷'],    maxNum:500, time:10, count:18, fractions:true,  brackets:true,  multiplier:5.0},
];

// ── Styled operator helpers ──────────────────────
const OP = {
  plus:   '<span class="op op-plus">+</span>',
  minus:  '<span class="op op-minus">&minus;</span>',
  times:  '<span class="op op-times">&times;</span>',
  divide: '<span class="op op-divide">&divide;</span>',
  lp:     '<span class="op op-bracket">(</span>',
  rp:     '<span class="op op-bracket">)</span>',
};

// ── Random question generation ───────────────────
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function generateQuestion(level) {
  const cfg = LEVELS[level - 1];
  if (cfg.fractions && Math.random() < 0.25) return genFraction(cfg);
  if (cfg.brackets && Math.random() < 0.25) return genBracket(cfg);
  const op = cfg.ops[rand(0, cfg.ops.length - 1)];
  let a, b, answer, display;
  switch (op) {
    case '+':
      a = rand(1, cfg.maxNum); b = rand(1, cfg.maxNum);
      answer = a + b; display = `${a} ${OP.plus} ${b}`; break;
    case '-':
      a = rand(1, cfg.maxNum); b = rand(1, a);
      answer = a - b; display = `${a} ${OP.minus} ${b}`; break;
    case '×':
      a = rand(1, Math.min(cfg.maxNum, 12)); b = rand(1, Math.min(cfg.maxNum, 12));
      answer = a * b; display = `${a} ${OP.times} ${b}`; break;
    case '÷':
      b = rand(1, Math.min(cfg.maxNum, 12));
      answer = rand(1, Math.min(cfg.maxNum, 12));
      a = b * answer;
      display = `${a} ${OP.divide} ${b}`; break;
  }
  return { display, answer: String(answer), parTime: cfg.time };
}

function genFraction(cfg) {
  const type = rand(1, 3);
  const dens = [2, 3, 4, 5, 6, 8];
  if (type === 1) {
    const d = dens[rand(0, 5)], a = rand(1, d - 1), b = rand(1, d - 1);
    const n = a + b, g = gcd(n, d);
    let ans;
    if (n / g >= d / g) {
      const w = Math.floor(n / d), r = n % d;
      if (r === 0) ans = String(w);
      else { const g2 = gcd(r, d); ans = `${w} ${r / g2}/${d / g2}`; }
    } else ans = `${n / g}/${d / g}`;
    return {
      display: `<span class="frac"><span class="num">${a}</span><span class="den">${d}</span></span> ${OP.plus} <span class="frac"><span class="num">${b}</span><span class="den">${d}</span></span>`,
      answer: ans, parTime: cfg.time + 5, isFraction: true
    };
  }
  if (type === 2) {
    const d = dens[rand(0, 5)], n = rand(1, d - 1), g = gcd(n, d);
    return {
      display: `What fraction is <strong>${n}</strong> out of <strong>${d}</strong>?`,
      answer: `${n / g}/${d / g}`, parTime: cfg.time + 5, isFraction: true
    };
  }
  const d = dens[rand(0, 5)], a = rand(2, d - 1), b = rand(1, a - 1);
  const n = a - b, g = gcd(n, d);
  return {
    display: `<span class="frac"><span class="num">${a}</span><span class="den">${d}</span></span> ${OP.minus} <span class="frac"><span class="num">${b}</span><span class="den">${d}</span></span>`,
    answer: n === 0 ? '0' : `${n / g}/${d / g}`, parTime: cfg.time + 5, isFraction: true
  };
}

function genBracket(cfg) {
  const templates = [
    () => { const a=rand(1,10),b=rand(1,10),c=rand(2,5); return {display:`${c} ${OP.times} ${OP.lp}${a} ${OP.plus} ${b}${OP.rp}`,answer:String(c*(a+b))}; },
    () => { const a=rand(5,20),b=rand(1,5),c=rand(1,5); return {display:`${OP.lp}${a} ${OP.minus} ${b}${OP.rp} ${OP.times} ${c}`,answer:String((a-b)*c)}; },
    () => { const a=rand(2,10),b=rand(2,10),c=rand(1,5); return {display:`${OP.lp}${a} ${OP.plus} ${b}${OP.rp} ${OP.divide} ${c}`,answer:String((a+b)/c)}; },
    () => { const a=rand(1,8),b=rand(1,8),c=rand(1,5); return {display:`${a} ${OP.plus} ${OP.lp}${b} ${OP.times} ${c}${OP.rp}`,answer:String(a+b*c)}; },
  ];
  for (let i = 0; i < 20; i++) {
    const q = templates[rand(0, templates.length - 1)]();
    const v = Number(q.answer);
    if (Number.isInteger(v) && v >= 0 && v <= 1000)
      return { display: q.display, answer: q.answer, parTime: cfg.time + 5 };
  }
  const a=rand(2,5),b=rand(1,5),c=rand(1,5);
  return { display:`${a} ${OP.times} ${OP.lp}${b} ${OP.plus} ${c}${OP.rp}`, answer:String(a*(b+c)), parTime:cfg.time+5 };
}

function generateQuestionSet(level) {
  const cfg = LEVELS[level - 1];
  const qs = [];
  for (let i = 0; i < cfg.count; i++) qs.push(generateQuestion(level));
  return qs;
}

// ── Scoring (time + complexity) ──────────────────
function calculateScore(level, results) {
  const cfg = LEVELS[level - 1];
  let total = 0, streak = 0, best = 0;
  results.forEach(r => {
    if (r.correct) {
      streak++;
      if (streak > best) best = streak;
      const speed = Math.min(Math.max(r.parTime / Math.max(r.timeTaken, 0.5), 0.5), 3.0);
      const streakBonus = Math.min(streak - 1, 10) * 50;
      total += Math.round((100 * cfg.multiplier * speed) + (streakBonus * cfg.multiplier));
    } else { streak = 0; }
  });
  const correct = results.filter(r => r.correct).length;
  let perfectBonus = 0;
  if (correct === results.length && results.length > 0) {
    perfectBonus = Math.round(500 * cfg.multiplier);
    total += perfectBonus;
  }
  const avgSpeed = results.filter(r => r.correct).reduce((s, r) => s + r.timeTaken, 0) / Math.max(correct, 1);
  return {
    totalScore: total, correctCount: correct, totalQuestions: results.length,
    bestStreak: best, perfectBonus, avgSpeed: Math.round(avgSpeed * 10) / 10,
    multiplier: cfg.multiplier
  };
}

// ── State ────────────────────────────────────────
let selectedChar = null;
let questions = [], curQ = 0, correctCount = 0, curStreak = 0, bestStreak = 0, gameLevel = 1;
let timerInterval = null, stopwatchElapsed = 0;
let roundResults = [];
let qStartTime = 0;

// Screen history for back button
const screenHistory = ['char-screen'];
let currentScreen = 'char-screen';

// ── Screen management ────────────────────────────
function showScreen(id, pushHistory = true) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (pushHistory && id !== currentScreen) {
    screenHistory.push(id);
  }
  currentScreen = id;
  updateNav();
}

function updateNav() {
  const nav = document.getElementById('nav-bar');
  // Hide nav on home screen, show everywhere else
  if (currentScreen === 'char-screen') {
    nav.classList.add('hidden');
  } else {
    nav.classList.remove('hidden');
  }
}

function goBack() {
  // Stop timer and clear bg if leaving game
  if (currentScreen === 'game-screen') { clearInterval(timerInterval); clearGameBg(); }
  if (screenHistory.length > 1) {
    screenHistory.pop();
    const prev = screenHistory[screenHistory.length - 1];
    showScreen(prev, false);
  }
}

function goHome() {
  clearInterval(timerInterval);
  clearGameBg();
  screenHistory.length = 0;
  screenHistory.push('char-screen');
  showScreen('char-screen', false);
}

// ── Mobile keyboard detection (robust) ───────────
(function initKeyboardDetection() {
  if (!window.visualViewport) return;
  const vv = window.visualViewport;
  // Capture initial height on first load (before any keyboard)
  let fullH = vv.height;

  function onResize() {
    const h = vv.height;
    // Update --vvh so the game screen sizes to exactly the visible area
    document.documentElement.style.setProperty('--vvh', h + 'px');
    if (h < fullH * 0.72) {
      document.body.classList.add('kb-up');
      // Scroll to bottom so question + input are fully visible
      requestAnimationFrame(() => {
        const gs = document.getElementById('game-screen');
        if (gs) gs.scrollTop = gs.scrollHeight;
      });
    } else {
      document.body.classList.remove('kb-up');
      fullH = Math.max(fullH, h); // reset baseline when keyboard closes
    }
  }
  vv.addEventListener('resize', onResize);
  // Also listen for orientation change to reset baseline
  window.addEventListener('orientationchange', () => {
    setTimeout(() => { fullH = vv.height; onResize(); }, 300);
  });
})();

// ── Game ─────────────────────────────────────────
function startGame(level) {
  gameLevel = level;
  questions = generateQuestionSet(level);
  curQ = 0; correctCount = 0; curStreak = 0; bestStreak = 0; roundResults = [];
  const cfg = LEVELS[level - 1];
  document.getElementById('hud-char-emoji').textContent = selectedChar?.emoji || '👾';
  document.getElementById('hud-level-name').textContent = cfg.name;
  document.getElementById('hud-qtotal').textContent = questions.length;
  // Build animated background based on character + level
  const palette = PALETTES[selectedChar?.id] || ['#7c3aed','#3b82f6','#22d3ee'];
  buildScene(level, palette);
  showScreen('game-screen');
  showQuestion();
}

function showQuestion() {
  if (curQ >= questions.length) { endGame(); return; }
  const q = questions[curQ];
  document.getElementById('hud-qnum').textContent = curQ + 1;
  document.getElementById('hud-correct').textContent = correctCount;
  document.getElementById('q-text').innerHTML = q.display;
  document.getElementById('feedback').textContent = '';
  const inp = document.getElementById('ans-input');
  inp.value = ''; inp.className = 'ans-input'; inp.disabled = false;
  inp.inputMode = q.isFraction ? 'text' : 'numeric';
  inp.focus();
  document.getElementById('btn-submit').disabled = false;
  updateStreak();
  qStartTime = performance.now();
  startStopwatch(q.parTime);
}

function startStopwatch(parTime) {
  clearInterval(timerInterval);
  stopwatchElapsed = 0;
  const bar = document.getElementById('timer-bar');
  bar.style.width = '0%';
  bar.classList.remove('slow', 'very-slow');
  document.getElementById('hud-timer').textContent = '0.0';
  timerInterval = setInterval(() => {
    stopwatchElapsed += 0.1;
    document.getElementById('hud-timer').textContent = stopwatchElapsed.toFixed(1);
    const pct = Math.min((stopwatchElapsed / parTime) * 100, 100);
    bar.style.width = pct + '%';
    if (stopwatchElapsed > parTime * 2) { bar.classList.add('very-slow'); bar.classList.remove('slow'); }
    else if (stopwatchElapsed > parTime) { bar.classList.add('slow'); bar.classList.remove('very-slow'); }
    else { bar.classList.remove('slow', 'very-slow'); }
  }, 100);
}

function submitAnswer() {
  clearInterval(timerInterval);
  const q = questions[curQ];
  const inp = document.getElementById('ans-input');
  const fb = document.getElementById('feedback');
  const raw = inp.value.trim();
  if (!raw) { inp.focus(); return; }

  const timeTaken = (performance.now() - qStartTime) / 1000;
  const ok = checkAnswer(raw, q.answer);

  if (ok) {
    correctCount++; curStreak++;
    if (curStreak > bestStreak) bestStreak = curStreak;
    inp.className = 'ans-input correct'; fb.className = 'feedback ok';
    const phrases = ['Amazing! ✨','Brilliant! 🌟','Correct! 🚀','Awesome! 💫','Yes! ☄️','Perfect! 🪐','Super! 🌙','Wow! 🛸'];
    fb.textContent = phrases[~~(Math.random() * phrases.length)];
  } else {
    curStreak = 0;
    inp.className = 'ans-input wrong'; fb.className = 'feedback no';
    fb.textContent = `Nope — it's ${q.answer}`;
  }

  roundResults.push({ correct: ok, timeTaken: Math.round(timeTaken * 10) / 10, parTime: q.parTime });
  updateStreak();
  inp.disabled = true; document.getElementById('btn-submit').disabled = true;
  setTimeout(() => { curQ++; showQuestion(); }, ok ? 900 : 1800);
}

function checkAnswer(u, c) {
  const norm = s => s.toLowerCase().replace(/\s+/g, '').replace(/⁄/g, '/');
  if (norm(u) === norm(c)) return true;
  const uN = parseFloat(u), cN = parseFloat(c);
  if (!isNaN(uN) && !isNaN(cN) && Math.abs(uN - cN) < 0.001) return true;
  if (u.includes('/') || c.includes('/')) {
    const parseFrac = s => {
      const parts = s.replace(/\s+/g, ' ').trim().split(' ');
      if (parts.length === 2 && parts[1].includes('/')) {
        const w = parseFloat(parts[0]);
        const [n, d] = parts[1].split('/').map(Number);
        if (!isNaN(w) && !isNaN(n) && d) return w + n / d;
      }
      if (s.includes('/')) {
        const [n, d] = s.split('/').map(Number);
        if (!isNaN(n) && d) return n / d;
      }
      return parseFloat(s);
    };
    const a = parseFrac(u), b = parseFrac(c);
    if (!isNaN(a) && !isNaN(b) && Math.abs(a - b) < 0.001) return true;
  }
  return false;
}

function updateStreak() {
  const el = document.getElementById('streak-line');
  el.textContent = curStreak >= 3 ? `🔥 ${curStreak} in a row!` : '';
}

// ── End game & results ───────────────────────────

  clearInterval(timerInterval);
  clearGameBg();
  const s = calculateScore(gameLevel, roundResults);
  const pct = s.totalQuestions > 0 ? Math.round(s.correctCount / s.totalQuestions * 100) : 0;

  let emoji, title, sub;
  if (pct === 100)     { emoji='🏆'; title='PERFECT SCORE!'; sub='Absolute superstar!'; launchConfetti(); }
  else if (pct >= 80)  { emoji='🌟'; title='Excellent!';     sub="You're an amazing explorer!"; launchConfetti(); }
  else if (pct >= 60)  { emoji='🚀'; title='Great Work!';    sub='Keep practising to reach the stars!'; }
  else if (pct >= 40)  { emoji='🌙'; title='Good Try!';      sub='Every astronaut needs practice!'; }
  else                 { emoji='💪'; title='Keep Going!';    sub="You've got this — try again!"; }

  const totalTime = roundResults.reduce((s, r) => s + r.timeTaken, 0);
  const totalTimeFmt = totalTime >= 60 ? `${Math.floor(totalTime/60)}m ${Math.round(totalTime%60)}s` : `${Math.round(totalTime*10)/10}s`;

  const card = document.getElementById('results-card');
  card.innerHTML = `
    <div class="res-emoji">${emoji}</div>
    <div class="res-title">${title}</div>
    <div class="res-sub">${sub}</div>
    ${s.perfectBonus ? `<div class="perfect-banner">🎉 Perfect Round Bonus: +${s.perfectBonus} points!</div>` : ''}
    <div class="score-hero">${s.totalScore.toLocaleString()}</div>
    <div class="score-label">Total Score</div>
    <div class="res-stats">
      <div class="rs"><div class="v green">${s.correctCount}/${s.totalQuestions}</div><div class="l">Correct</div></div>
      <div class="rs"><div class="v cyan">${s.avgSpeed}s</div><div class="l">Avg Speed</div></div>
      <div class="rs"><div class="v orange">×${s.multiplier}</div><div class="l">Multiplier</div></div>
      <div class="rs"><div class="v pink">${bestStreak}</div><div class="l">Best Streak</div></div>
      <div class="rs"><div class="v gold">${pct}%</div><div class="l">Accuracy</div></div>
      <div class="rs"><div class="v" style="color:var(--ring)">${totalTimeFmt}</div><div class="l">Total Time</div></div>
    </div>
    <div class="score-breakdown">
      <h4>How Your Score Works</h4>
      <div class="sb-row"><span>✅ 100 base points per correct answer</span></div>
      <div class="sb-row"><span>⚡ ×${s.multiplier} level difficulty multiplier</span></div>
      <div class="sb-row"><span>🏎️ Speed bonus — beat the par time for up to ×3 points</span></div>
      <div class="sb-row"><span>🔥 Streak bonus — +50 per consecutive correct</span></div>
      ${s.perfectBonus ? `<div class="sb-row perfect"><span>🏆 Perfect round bonus</span><span>+${s.perfectBonus}</span></div>` : ''}
    </div>
  `;

  document.getElementById('btn-again').onclick = () => startGame(gameLevel);
  showScreen('results-screen');
}

// ── Confetti ─────────────────────────────────────
function launchConfetti() {
  const box = document.getElementById('confetti-box'); box.innerHTML = '';
  const cols = ['#fbbf24','#ec4899','#3b82f6','#34d399','#f97316','#22d3ee','#c084fc','#ef4444'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = cols[~~(Math.random() * cols.length)];
    p.style.animationDelay = Math.random() * 1.5 + 's';
    p.style.animationDuration = (2 + Math.random() * 2) + 's';
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    box.appendChild(p);
  }
  setTimeout(() => box.innerHTML = '', 4000);
}

// ── Keyboard shortcut ────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('game-screen').classList.contains('active')) {
    const inp = document.getElementById('ans-input');
    if (!inp.disabled && inp.value.trim()) submitAnswer();
  }
});

// ── Initialise ───────────────────────────────────
renderCharGrid();
renderLevelGrid();
updateNav();

// Ensure input stays visible on mobile keyboard open
document.getElementById('ans-input').addEventListener('focus', () => {
  if (!window.visualViewport) return;
  setTimeout(() => {
    const gs = document.getElementById('game-screen');
    if (gs) gs.scrollTop = gs.scrollHeight;
  }, 300);
});
</script>
</body>
</html>
